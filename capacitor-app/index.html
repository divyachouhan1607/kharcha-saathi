<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kharcha Saathi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FDF6F2 0%, #F5DDD0 100%);
      padding: 24px;
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #D4603A;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 14px;
      color: #888;
      margin-bottom: 40px;
    }
    .card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.5);
      text-align: center;
    }
    .card h2 {
      font-size: 18px;
      font-weight: 700;
      color: #D4603A;
      margin-bottom: 6px;
    }
    .card p {
      font-size: 14px;
      color: #999;
      margin-bottom: 24px;
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: all 0.2s;
    }
    .google-btn:active { transform: scale(0.98); }
    .google-btn:disabled { opacity: 0.6; }
    .google-btn svg { width: 20px; height: 20px; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
    }
    .divider span { font-size: 12px; color: #bbb; }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e5e5;
    }
    .features {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 16px;
    }
    .feature { text-align: center; }
    .feature .icon { font-size: 18px; }
    .feature .label { font-size: 10px; color: #999; margin-top: 2px; }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #bbb;
    }
    .status {
      margin-top: 16px;
      font-size: 13px;
      color: #D4603A;
      display: none;
    }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .loading p { color: #D4603A; font-weight: 600; }
  </style>
</head>
<body>
  <!-- Loading screen (shown while checking auth) -->
  <div id="loadingScreen" class="loading">
    <p>Loading...</p>
  </div>

  <!-- Login screen (shown when not authenticated) -->
  <div id="loginScreen" style="display:none; text-align:center;">
    <div class="logo">Kharcha Saathi</div>
    <div class="tagline">Your companion for smarter spending!</div>
    <div class="card">
      <h2>Welcome Back!!</h2>
      <p>Sign in to continue tracking your expenses</p>
      <button class="google-btn" id="signInBtn" onclick="handleSignIn()">
        <svg viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
      <div id="statusMsg" class="status"></div>
      <div class="divider"><span>secure login</span></div>
      <div class="features">
        <div class="feature"><div class="icon">&#128274;</div><div class="label">Encrypted</div></div>
        <div class="feature"><div class="icon">&#9889;</div><div class="label">Instant</div></div>
        <div class="feature"><div class="icon">&#127381;</div><div class="label">It's Free</div></div>
      </div>
    </div>
    <div class="footer">By signing in, you agree to let Kharcha Saathi help you save more</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://txyhaadyxxjxvwtipbzr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4eWhhYWR5eHhqeHZ3dGlwYnpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NjA3OTAsImV4cCI6MjA5MTMzNjc5MH0.un3qgYSHZWE6V1sI8JKyGuQGLCgLSLnD17blILaR_R4';
    const WEB_CLIENT_ID = '70670976387-jegs52h23874eue79q0r0a5oe75t56qt.apps.googleusercontent.com';
    const APP_URL = 'https://kharcha-saathi.vercel.app';

    function showStatus(msg) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    // Check if user has a saved session
    async function checkExistingSession() {
      const saved = localStorage.getItem('kharcha_session');
      if (saved) {
        try {
          const session = JSON.parse(saved);
          // Verify the token is still valid
          const res = await fetch(SUPABASE_URL + '/auth/v1/user', {
            headers: {
              'Authorization': 'Bearer ' + session.access_token,
              'apikey': SUPABASE_KEY
            }
          });
          if (res.ok) {
            // Session valid — go to app
            goToApp(session.access_token, session.refresh_token);
            return;
          }
          // Try refresh
          const refreshRes = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_KEY
            },
            body: JSON.stringify({ refresh_token: session.refresh_token })
          });
          if (refreshRes.ok) {
            const data = await refreshRes.json();
            localStorage.setItem('kharcha_session', JSON.stringify({
              access_token: data.access_token,
              refresh_token: data.refresh_token
            }));
            goToApp(data.access_token, data.refresh_token);
            return;
          }
        } catch (e) {
          // Session invalid, show login
        }
        localStorage.removeItem('kharcha_session');
      }
      // No valid session — show login screen
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'block';
    }

    function goToApp(accessToken, refreshToken) {
      const url = APP_URL + '/auth/set-session'
        + '?access_token=' + encodeURIComponent(accessToken)
        + '&refresh_token=' + encodeURIComponent(refreshToken);
      window.location.href = url;
    }

    async function handleSignIn() {
      const btn = document.getElementById('signInBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const plugin = window.Capacitor?.Plugins?.SocialLogin;
        if (!plugin) throw new Error('Plugin not available');

        await plugin.initialize({
          google: { webClientId: WEB_CLIENT_ID }
        });

        const result = await plugin.login({
          provider: 'google',
          options: { scopes: ['email', 'profile'] }
        });

        const idToken = result?.result?.idToken;
        if (!idToken) throw new Error('No ID token received');

        // Exchange Google ID token with Supabase for a session
        showStatus('Verifying account...');
        const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=id_token', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY
          },
          body: JSON.stringify({
            provider: 'google',
            id_token: idToken
          })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error_description || err.msg || 'Auth failed');
        }

        const session = await res.json();

        // Save session locally for next app launch
        localStorage.setItem('kharcha_session', JSON.stringify({
          access_token: session.access_token,
          refresh_token: session.refresh_token
        }));

        // Navigate to the app with the session
        showStatus('Opening your dashboard...');
        goToApp(session.access_token, session.refresh_token);

      } catch (err) {
        showStatus('Sign-in failed: ' + (err.message || 'Unknown error'));
        btn.disabled = false;
        btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:20px;height:20px"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continue with Google';
      }
    }

    // Start
    checkExistingSession();
  </script>
</body>
</html>
